<body>


 <!-- Navbar -->
<div class="navbar">
  <div class="navbartext"> 
  <a href="index.html" class="logo">Weddibudy</a>

  <ul class="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="albumdesign.html">Album Design</a></li>
  </ul>
  </div>
</div>


<!-- 🌈 Background Glow -->
<div class="bg-glow"></div>

<section class="contact-section">

  <h1 class="title">Let's Create Magic ✨</h1>
  <p class="subtitle">Wedding • Baby Shoot • Album Design</p>

  <div class="contact-container">

    <!-- LEFT INFO -->
    <div class="contact-info">
      <h2>Contact Us</h2>
      <p>We turn your moments into lifetime memories 💖</p>

      <div class="info-box">
        <span>📧</span>
        <p>weddibudy@gamil.com</p>
      </div>

      <div class="info-box">
        <span>📍</span>
        <p>Kolkata, India</p>
      </div>

      <div class="socials">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">WhatsApp</a>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="contact-form">
     <form action="https://formspree.io/f/xaqpkyje" method="POST">
        
        <div class="input-box">
          <input type="text" name="name" required>
          <label>Your Name</label>
        </div>

        <div class="input-box">
          <input type="email" name="email" required>
          <label>Email Address</label>
        </div>

        <div class="input-box">
          <textarea name="message" required></textarea>
          <label>Your Message</label>
        </div>

        <button type="submit">Send Message 🚀</button>

      </form>
    </div>

  </div>
</section>
<a href="https://wa.me/919593123569" class="whatsapp-float" target="_blank">
  💬
</a>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if(response.ok){
      form.innerHTML = "<h2 style='color:#00ffcc'>✅ Message Sent Successfully!</h2>";
    } else {
      form.innerHTML = "<h2 style='color:red'>❌ Error! Try Again</h2>";
    }
  });
});
</script>

</body>
</html>
